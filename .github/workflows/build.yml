name: Build UltimateStorageSystem

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UltimateStorageSystem
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout GiftMail (for game reference DLLs)
        uses: actions/checkout@v4
        with:
          repository: ferrles124/GiftMail
          ref: main
          path: giftmail-repo

      - name: Copy reference DLLs into project
        run: |
          mkdir -p main-repo/UltimateStorageSystem/UltimateStorageSystem/libs
          cp giftmail-repo/StardewValley.dll main-repo/StardewValley.dll
          cp giftmail-repo/libs/MonoGame.Framework.dll main-repo/UltimateStorageSystem/UltimateStorageSystem/libs/
          cp giftmail-repo/libs/StardewModdingAPI.dll main-repo/UltimateStorageSystem/UltimateStorageSystem/libs/
          cp giftmail-repo/libs/xTile.dll main-repo/UltimateStorageSystem/UltimateStorageSystem/libs/

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check libs
        run: |
          ls -la main-repo/
          ls -la main-repo/UltimateStorageSystem/UltimateStorageSystem/libs/

      - name: Build
        run: dotnet build main-repo/UltimateStorageSystem/UltimateStorageSystem/UltimateStorageSystem.csproj --configuration Release

      - name: Prepare mod package
        run: |
          mkdir -p package/UltimateStorageSystem
          cp main-repo/UltimateStorageSystem/UltimateStorageSystem/bin/Release/net8.0/UltimateStorageSystem.dll package/UltimateStorageSystem/
          cp main-repo/UltimateStorageSystem/UltimateStorageSystem/manifest.json package/UltimateStorageSystem/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltimateStorageSystem
          path: package/
          retention-days: 30
